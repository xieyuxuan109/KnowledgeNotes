syntax = "proto3";

package api;
option go_package = "demo2/api";
import "google/protobuf/wrappers.proto";
message NoticeReaderRequest {
  string msg = 1;
  oneof notice_way{
    string email=2;
    string phone=3;
  }
}

message Book{
  string title=1;
  string author = 2;
  optional int64 price =3;
  google.protobuf.DoubleValue price2 =4;
  google.protobuf.StringValue memo =5;
}

